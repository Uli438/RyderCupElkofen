<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏆 Ryder Cup Elkofen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#daeeff;--bg2:#c8e6fa;--bg3:#b8d8f5;
  --card:#fff;--border:#2c2c2c;--bl:#8bb8d8;
  --txt:#111;--txt2:#334455;--txt3:#556677;
  --acc:#1565c0;--green:#2e7d32;--red:#c62828;
  --ta:#c62828;--tb:#1565c0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input,select,button{font-family:'DM Sans',sans-serif}
.serif{font-family:'Cormorant Garamond',serif}
.view{display:none;flex-direction:column;min-height:100vh}
.view.active{display:flex}

/* hero */
.hero{background:linear-gradient(135deg,#1a237e,#c62828);padding:22px 16px 16px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.1);pointer-events:none}
.hi{position:relative;z-index:1}
.he{font-size:10px;color:rgba(255,255,255,0.65);letter-spacing:3px;margin-bottom:3px;font-weight:700}
.ht{font-size:25px;color:#fff;font-weight:700;line-height:1.1}
.hs{font-size:11px;color:rgba(255,255,255,0.7);margin-top:3px}
.htabs{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;align-items:center}
.htab{padding:5px 12px;border-radius:20px;border:2px solid rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.htab.on{background:#fff;color:var(--acc)}
.htab.adm{margin-left:auto;background:rgba(0,0,0,0.2)}

/* player bar */
.pbar{background:var(--card);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.pbar-lbl{font-size:11px;font-weight:700;color:var(--acc);letter-spacing:1px;white-space:nowrap}
.pbar-sel{flex:1;background:var(--card);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:14px;font-weight:600;padding:8px 12px;outline:none;cursor:pointer}

/* scoreboard */
.sb{background:linear-gradient(135deg,#1a237e,#c62828);padding:14px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;border-bottom:2px solid var(--border)}
.sbt{text-align:center}
.sbt-n{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.6)}
.sbt-p{font-size:40px;font-weight:900;line-height:1;font-family:'Cormorant Garamond',serif}
.sbt-p.a{color:#ffcdd2}.sbt-p.b{color:#bbdefb}
.sbv{text-align:center;color:rgba(255,255,255,0.5);font-size:12px;font-weight:700}
.sbv-d{font-size:9px;color:rgba(255,255,255,0.4);margin-top:2px;letter-spacing:1px}

/* pairings */
.sh{padding:9px 16px 6px;font-size:9px;color:var(--acc);letter-spacing:2px;font-weight:700;background:var(--bg2);border-bottom:1px solid var(--bl)}
.pc{background:var(--card);border-bottom:1px solid var(--bl);padding:12px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pc:active{background:#e3f2fd}
.mbadge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:1px;margin-bottom:6px}
.bm{background:#fff3e0;color:#e65100;border:1px solid #e65100}
.bb{background:#f3e5f5;color:#6a1b9a;border:1px solid #6a1b9a}
.bs{background:#e8f5e9;color:#2e7d32;border:1px solid #2e7d32}
.pg{display:grid;grid-template-columns:1fr 28px 1fr;align-items:center;gap:4px}
.pna{font-size:15px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--ta);text-align:right}
.pnb{font-size:15px;font-weight:700;font-family:'Cormorant Garamond',serif;color:var(--tb);text-align:left}
.phcp{font-size:10px;color:var(--txt3)}
.pvs{text-align:center;font-size:11px;font-weight:700;color:var(--txt3)}
.pr{margin-top:8px;display:flex;justify-content:center}
.rpill{padding:3px 14px;border-radius:20px;font-size:11px;font-weight:700}
.rpa{background:#ffebee;color:var(--ta);border:1px solid var(--ta)}
.rpb{background:#e3f2fd;color:var(--tb);border:1px solid var(--tb)}
.rpd{background:#f5f5f5;color:#555;border:1px solid #999}
.rpo{background:#fff8e1;color:#f57f17;border:1px solid #f57f17}
.empty{text-align:center;padding:50px 20px;color:var(--txt3)}

/* header */
.hdr{background:var(--bg2);border-bottom:2px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.back{background:none;border:none;color:var(--acc);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1;font-weight:700}
.hdr-t{font-size:17px;color:var(--txt);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-s{font-size:10px;color:var(--txt2)}
.spill{text-align:center;flex-shrink:0}
.spv{font-size:18px;font-weight:900;line-height:1}
.spl{font-size:9px;color:var(--txt3)}

/* match bar */
.mbar{padding:10px 16px;text-align:center;font-weight:900;font-size:17px;font-family:'Cormorant Garamond',serif;border-bottom:2px solid var(--border)}

/* score tabs */
.stabs{display:flex;background:var(--bg2);border-bottom:2px solid var(--border)}
.stab{flex:1;padding:9px 0;background:none;border:none;border-bottom:3px solid transparent;color:var(--txt2);font-size:11px;letter-spacing:1.5px;cursor:pointer;font-weight:600}
.stab.on{border-bottom-color:var(--acc);color:var(--acc)}
.colh{display:grid;padding:7px 14px 4px;gap:6px;font-size:9px;color:var(--txt3);letter-spacing:1px;background:var(--bg2);border-bottom:1px solid var(--bl)}
.hrow{display:grid;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--bl);background:var(--card)}
.hrow.filled{background:#e8f4fd}
.hinfo{text-align:center}
.hnum{font-size:14px;font-weight:700;color:var(--txt)}
.hpar{font-size:9px;color:var(--txt3)}
.stepper{display:flex;align-items:center;background:var(--card);border:2px solid var(--border);border-radius:10px;overflow:hidden;height:50px}
.stbtn{background:none;border:none;color:var(--acc);font-size:28px;width:48px;height:50px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;touch-action:manipulation;font-weight:900}
.stbtn:active{background:#bbdefb}
.stval{flex:1;text-align:center;font-size:22px;font-weight:700;color:var(--txt);font-family:'Cormorant Garamond',serif}
.stval.e{color:#aaa;font-size:15px}
.readonly{display:flex;align-items:center;justify-content:center;height:50px;background:#f0f4f8;border-radius:10px;border:2px solid #d0dde8;font-size:22px;font-weight:700;color:var(--txt);font-family:'Cormorant Garamond',serif;position:relative}
.readonly.e{color:#bbb;font-size:15px}
.eye{position:absolute;top:3px;right:6px;font-size:9px;color:#aaa}
.hres{text-align:center;display:flex;align-items:center;justify-content:center}
.swrap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 22px;background:linear-gradient(transparent,var(--bg) 40%)}
.sbtn{width:100%;padding:14px 0;border:3px solid #1b5e20;border-radius:12px;color:#fff;font-size:18px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#2e7d32,#43a047);box-shadow:0 6px 20px rgba(46,125,50,0.4)}
.sbtn:disabled{background:#aaa;border-color:#aaa;box-shadow:none}

/* sheet */
.sheet-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.5);align-items:flex-end;justify-content:center}
.sheet-overlay.on{display:flex}
.sheet{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;padding:24px 20px 36px;border-top:3px solid var(--border)}
.sheet-handle{width:40px;height:4px;background:var(--bl);border-radius:4px;margin:0 auto 16px}
.sheet-eye{font-size:9px;color:var(--txt3);letter-spacing:2px;font-weight:700;margin-bottom:6px}
.sheet-title{font-size:20px;font-weight:700;color:var(--txt);margin-bottom:16px}
.sheet-lbl{font-size:11px;color:var(--txt3);letter-spacing:2px;font-weight:700;margin-bottom:8px}
.sheet-sel{width:100%;background:var(--card);border:2px solid var(--border);border-radius:12px;color:var(--txt);font-size:16px;font-weight:600;padding:14px;outline:none;cursor:pointer;margin-bottom:16px}
.sheet-btns{display:flex;gap:10px}
.sheet-cancel{flex:1;padding:13px;background:var(--bg2);border:2px solid var(--border);border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;color:var(--txt2)}
.sheet-ok{flex:2;padding:13px;background:linear-gradient(135deg,var(--acc),#1976d2);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;color:#fff}

/* admin */
.abody{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:40px}
.albl{font-size:9px;color:var(--acc);letter-spacing:2px;margin-bottom:8px;font-weight:700}
.ahint{font-size:10px;color:var(--txt2);margin-bottom:8px;line-height:1.5}
.inp{background:var(--card);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:15px;padding:11px 14px;outline:none;width:100%}
.inp:focus{border-color:var(--acc)}
.r2{display:flex;gap:8px}.r2 .inp{flex:1}
.tbox{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.thdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tdot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.prow{display:grid;grid-template-columns:1fr 80px 36px;gap:6px;margin-bottom:6px;align-items:center}
.pcell{padding:9px 12px;background:var(--bg2);border:1px solid var(--bl);border-radius:8px;font-size:14px;font-weight:600}
.rmbtn{background:#ffebee;border:2px solid var(--red);border-radius:8px;color:var(--red);font-size:16px;padding:7px;cursor:pointer;line-height:1;font-weight:700}
.arow{display:grid;grid-template-columns:1fr 80px auto;gap:6px;margin-top:4px}
.addbtn{border:none;border-radius:10px;color:#fff;font-size:20px;padding:0 14px;cursor:pointer;font-weight:700}
.padm{background:var(--card);border:2px solid var(--bl);border-radius:10px;padding:12px;margin-bottom:8px}
.padm-r{display:grid;grid-template-columns:1fr 28px 1fr;gap:6px;align-items:center;margin-bottom:8px}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:4px 10px;border-radius:20px;border:2px solid var(--bl);background:var(--card);font-size:11px;font-weight:700;cursor:pointer;color:var(--txt2)}
.chip.on{background:var(--acc);border-color:var(--acc);color:#fff}
.dtabs{display:flex;background:var(--bg2);border:2px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.dtab{flex:1;padding:10px 0;background:none;border:none;color:var(--txt2);font-size:12px;cursor:pointer;font-weight:700}
.dtab.on{background:var(--acc);color:#fff}
.cdrop{width:100%;background:var(--card);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:15px;padding:11px 14px;outline:none;cursor:pointer;margin-bottom:8px}
.rstbtn{background:#ffebee;border:2px solid var(--red);border-radius:10px;color:var(--red);font-size:14px;padding:11px;cursor:pointer;width:100%;font-weight:600}
.primbtn{background:linear-gradient(135deg,var(--green),#43a047);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;padding:13px;cursor:pointer;box-shadow:0 4px 14px rgba(46,125,50,0.3);width:100%}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--acc);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ROLE SHEET -->
<div class="sheet-overlay" id="sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-eye">PAARUNG</div>
    <div class="sheet-title serif" id="sheet-title"></div>
    <div class="sheet-lbl">ICH TRAGE EIN FÜR:</div>
    <select class="sheet-sel" id="sheet-sel"></select>
    <div class="sheet-btns">
      <button class="sheet-cancel" onclick="closeSheet()">Abbrechen</button>
      <button class="sheet-ok" onclick="confirmSheet()">Weiter →</button>
    </div>
  </div>
</div>

<!-- ══ LEADERBOARD ══ -->
<div id="view-lb" class="view active">
  <div class="hero">
    <div class="hi">
      <div class="he">🏆 RYDER CUP</div>
      <div class="ht serif" id="lb-name">Ryder Cup Elkofen</div>
      <div class="hs" id="lb-sub">Admin öffnen zum Einrichten</div>
      <div class="htabs">
        <button class="htab on" data-d="1" onclick="setDay(1)">TAG 1</button>
        <button class="htab" data-d="2" onclick="setDay(2)">TAG 2</button>
        <button class="htab" data-d="total" onclick="setDay('total')">GESAMT</button>
        <button class="htab adm" onclick="showView('admin')">⚙ Admin</button>
      </div>
    </div>
  </div>

  <!-- Spieler-Anmeldung -->
  <div class="pbar" id="pbar" style="display:none">
    <div class="pbar-lbl">ICH BIN:</div>
    <select class="pbar-sel" id="pbar-sel" onchange="setMe(this.value)">
      <option value="">— Spieler auswählen —</option>
    </select>
  </div>

  <!-- Scoreboard -->
  <div class="sb">
    <div class="sbt">
      <div class="sbt-n" id="lb-ta">TEAM A</div>
      <div class="sbt-p a serif" id="lb-pta">0</div>
    </div>
    <div class="sbv">VS<div class="sbv-d" id="lb-day">TAG 1</div></div>
    <div class="sbt">
      <div class="sbt-n" id="lb-tb">TEAM B</div>
      <div class="sbt-p b serif" id="lb-ptb">0</div>
    </div>
  </div>

  <div class="sh" id="lb-sh">PAARUNGEN</div>
  <div id="lb-pairs" style="padding-bottom:20px"></div>
</div>

<!-- ══ SCORE ENTRY ══ -->
<div id="view-score" class="view">
  <div class="hdr">
    <button class="back" onclick="showView('lb')">←</button>
    <div style="flex:1;min-width:0">
      <div class="hdr-t" id="sc-title"></div>
      <div class="hdr-s" id="sc-sub"></div>
    </div>
    <div class="spill">
      <div class="spv" id="sc-pill">–</div>
      <div class="spl" id="sc-plbl">Stand</div>
    </div>
  </div>
  <div class="mbar" id="mbar" style="display:none"></div>
  <div class="stabs">
    <button class="stab on" id="stf" onclick="setScTab('front')">FRONT 9 (1–9)</button>
    <button class="stab" id="stb" onclick="setScTab('back')">BACK 9 (10–18)</button>
  </div>
  <div class="colh" id="colh"></div>
  <div id="sc-holes"></div>
  <div style="height:82px"></div>
  <div class="swrap">
    <button class="sbtn serif" id="savebtn" onclick="saveScore()">Score speichern ✓</button>
  </div>
</div>

<!-- ══ ADMIN ══ -->
<div id="view-admin" class="view">
  <div class="hdr">
    <button class="back" onclick="showView('lb')">←</button>
    <div class="hdr-t serif">⚙ Admin</div>
  </div>
  <div class="abody">
    <section>
      <div class="albl">EVENT</div>
      <input class="inp" id="a-name" placeholder="z.B. Ryder Cup Elkofen 2025" style="margin-bottom:8px">
      <div class="r2">
        <input class="inp" type="date" id="a-d1">
        <input class="inp" type="date" id="a-d2">
      </div>
    </section>

    <section>
      <div class="albl">PLÄTZE</div>
      <div style="font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:600">TAG 1</div>
      <select class="cdrop" id="ac1s" onchange="loadCourse(1,this.value)"><option value="">— Gespeicherten Platz laden —</option></select>
      <input class="inp" id="ac1n" placeholder="Platzname Tag 1" style="margin-bottom:4px">
      <div class="r2" style="margin-bottom:10px">
        <input class="inp" type="number" id="ac1p" placeholder="Par (z.B. 72)">
        <input class="inp" id="ac1si" placeholder="SI kommagetrennt" style="font-size:12px">
      </div>
      <div style="font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:600">TAG 2</div>
      <select class="cdrop" id="ac2s" onchange="loadCourse(2,this.value)"><option value="">— Gespeicherten Platz laden —</option></select>
      <input class="inp" id="ac2n" placeholder="Platzname Tag 2" style="margin-bottom:4px">
      <div class="r2">
        <input class="inp" type="number" id="ac2p" placeholder="Par (z.B. 72)">
        <input class="inp" id="ac2si" placeholder="SI kommagetrennt" style="font-size:12px">
      </div>
    </section>

    <section>
      <div class="albl">TEAMS & SPIELER</div>
      <div class="tbox">
        <div class="thdr">
          <div class="tdot" style="background:var(--ta)"></div>
          <input class="inp" id="a-ta" placeholder="Team A Name" style="border:none;background:none;padding:0;font-size:17px;font-weight:700;color:var(--ta)">
        </div>
        <div id="apl-a"></div>
        <div class="arow">
          <input class="inp" id="np-a" placeholder="Spieler Name">
          <input class="inp" id="nh-a" type="number" step="0.1" placeholder="Vorg." style="text-align:center;padding:8px 4px">
          <button class="addbtn" style="background:var(--ta)" onclick="addP('a')">+</button>
        </div>
      </div>
      <div class="tbox">
        <div class="thdr">
          <div class="tdot" style="background:var(--tb)"></div>
          <input class="inp" id="a-tb" placeholder="Team B Name" style="border:none;background:none;padding:0;font-size:17px;font-weight:700;color:var(--tb)">
        </div>
        <div id="apl-b"></div>
        <div class="arow">
          <input class="inp" id="np-b" placeholder="Spieler Name">
          <input class="inp" id="nh-b" type="number" step="0.1" placeholder="Vorg." style="text-align:center;padding:8px 4px">
          <button class="addbtn" style="background:var(--tb)" onclick="addP('b')">+</button>
        </div>
      </div>
    </section>

    <section>
      <div class="albl">PAARUNGEN</div>
      <div class="dtabs">
        <button class="dtab on" onclick="setPD(1)">TAG 1</button>
        <button class="dtab" onclick="setPD(2)">TAG 2</button>
      </div>
      <div id="a-pairs"></div>
      <button onclick="addPair()" style="width:100%;padding:10px;background:var(--bg2);border:2px dashed var(--acc);border-radius:10px;color:var(--acc);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px">+ Paarung hinzufügen</button>
    </section>

    <button class="rstbtn" onclick="resetAll()">Alles zurücksetzen</button>
    <button class="primbtn serif" onclick="saveAdmin()">Speichern & Starten ✓</button>
  </div>
</div>

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function dc(d){if(d<=-2)return'#f4c430';if(d===-1)return'#4ade80';if(d===0)return'#94a3b8';if(d===1)return'#fb923c';return'#f87171';}
function dl(d){if(d<=-2)return'Eagle';if(d===-1)return'Birdie';if(d===0)return'Par';if(d===1)return'Bogey';if(d===2)return'Double';return`+${d}`;}

function xStr(idx,hcp,si){
  const s=(si||DSI)[idx]||idx+1;
  const h=Math.round(Math.abs(hcp))*(hcp<0?-1:1);
  if(h>=0)return Math.floor(h/18)+(h%18>=s?1:0);
  const a=Math.abs(h);return-(Math.floor(a/18)+(a%18>=s?1:0));
}
function net(b,i,h,si){return b==null?null:b-xStr(i,h,si);}
function stbl(n,p){if(n==null)return 0;const d=n-p;if(d>=2)return 0;if(d===1)return 1;if(d===0)return 2;if(d===-1)return 3;if(d===-2)return 4;return 5;}

async function initFB(){
  await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');

  db.ref('rc').on('value',snap=>{

    if(document.getElementById('view-score').classList.contains('active')&&CUR.pid){

// ═══════════════ HELPERS ═══════════════
function allP(){
  return[
    ...(S.teamA?.players||[]).map(p=>({...p,team:'a'})),
    ...(S.teamB?.players||[]).map(p=>({...p,team:'b'}))
  ];
}
function pName(id){return allP().find(p=>p.id===id)?.name||'–';}
function pHcp(id){return Number(allP().find(p=>p.id===id)?.hcp)||0;}
function getCourse(d){return S.courses?.[Number(d)]||{par:DPAR,si:DSI};}
function getP(id,day){return(S.pairings?.[day]||[]).find(p=>p.id===id)||null;}

// ═══════════════ CALC ═══════════════
function calcMatch(p,day){
  if(!p)return{ptA:0,ptB:0,status:'open'};
  const sc=p.scores||{};
  const hA=pHcp(p.playerA),hB=pHcp(p.playerB);
  const c=getCourse(Number(day)||1);
  const par=c.par||DPAR,si=c.si||DSI;
  const bn=p.bruttoNetto||'brutto';
  const mode=p.mode||'matchplay';
  if(mode==='matchplay')return calcMP(sc,hA,hB,par,si,bn);
  const hA2=pHcp(p.playerA2||'');
  const hB2=pHcp(p.playerB2||'');
  if(mode==='bestball') return calcBB(sc,hA,hB,par,si,bn,hA2,hB2);
  return calcSF(sc,hA,hB,par,si);
}

function calcMP(sc,hA,hB,par,si,bn){
  const sA=sc.playerA||Array(18).fill(null);
  const sB=sc.playerB||Array(18).fill(null);
  let wA=0,wB=0,played=0;
  for(let i=0;i<18;i++){
    if(sA[i]==null||sB[i]==null)continue;
    played++;
    const vA=bn==='netto'?net(sA[i],i,hA,si):sA[i];
    const vB=bn==='netto'?net(sB[i],i,hB,si):sB[i];
    if(vA<vB)wA++;else if(vB<vA)wB++;
  }
  const lead=wA-wB,left=18-played;
  let status='open';
  if(played>0){
    if(lead>left)status='A';
    else if(-lead>left)status='B';
    else if(played===18)status=lead>0?'A':lead<0?'B':'draw';
    else status='running';
  }
  return{ptA:status==='A'?1:status==='draw'?0.5:0,ptB:status==='B'?1:status==='draw'?0.5:0,status,lead,played,wA,wB};
}

function calcBB(sc,hA,hB,par,si,bn,hA2,hB2){
  // Best Ball: bestes Ergebnis pro Team pro Loch zählt
  const sA=sc.playerA||Array(18).fill(null);
  const sB=sc.playerB||Array(18).fill(null);
  const sA2=sc.playerA2||Array(18).fill(null); // 2. Spieler Team A
  const sB2=sc.playerB2||Array(18).fill(null); // 2. Spieler Team B
  let pA=0,pB=0,played=0;
  for(let i=0;i<18;i++){
    // Best Ball: Loch zählt wenn mind. 1 Spieler pro Team eingetragen hat
    const hasA=sA[i]!=null||sA2[i]!=null;
    const hasB=sB[i]!=null||sB2[i]!=null;
    if(!hasA||!hasB)continue;
    played++;
    // Bestes Ergebnis Team A
    const vA1=sA[i]!=null?(bn==='netto'?net(sA[i],i,hA,si):sA[i]):999;
    const vA2=sA2[i]!=null&&hA2!=null?(bn==='netto'?net(sA2[i],i,hA2,si):sA2[i]):999;
    const bestA=Math.min(vA1,vA2);
    // Bestes Ergebnis Team B
    const vB1=sB[i]!=null?(bn==='netto'?net(sB[i],i,hB,si):sB[i]):999;
    const vB2=sB2[i]!=null&&hB2!=null?(bn==='netto'?net(sB2[i],i,hB2,si):sB2[i]):999;
    const bestB=Math.min(vB1,vB2);
    if(bestA<bestB)pA++;else if(bestB<bestA)pB++;else{pA+=0.5;pB+=0.5;}
  }
  const done=played===18;
  const st=played===0?'open':pA>pB?'A':pB>pA?'B':'draw';
  return{ptA:done?(pA>pB?1:pA===pB?0.5:0):0,ptB:done?(pB>pA?1:pA===pB?0.5:0):0,status:st,played,ptsA:pA,ptsB:pB};
}

function calcSF(sc,hA,hB,par,si){
  const sA=sc.playerA||Array(18).fill(null);
  const sB=sc.playerB||Array(18).fill(null);
  let pA=0,pB=0,played=0;
  for(let i=0;i<18;i++){
    if(sA[i]==null||sB[i]==null)continue;
    played++;
    pA+=stbl(net(sA[i],i,hA,si),par[i]||4);
    pB+=stbl(net(sB[i],i,hB,si),par[i]||4);
  }
  const done=played===18;
  const st=played===0?'open':pA>pB?'A':pB>pA?'B':'draw';
  return{ptA:done?(pA>pB?1:pA===pB?0.5:0):0,ptB:done?(pB>pA?1:pA===pB?0.5:0):0,status:st,played,ptsA:pA,ptsB:pB};
}

function dayPts(day){
  let pA=0,pB=0;
  const pairs=(S.pairings?.[day])||[];
  pairs.forEach(p=>{
    const r=calcMatch(p,Number(day));
    pA+=r.ptA;pB+=r.ptB;
  });
  return{pA,pB};
}

  document.getElementById('lb-tb').textContent=S.teamB?.name||'TEAM B';

  if(curDay==='total'){const d1=dayPts(1),d2=dayPts(2);pA=d1.pA+d2.pA;pB=d1.pB+d2.pB;}
  else{const d=dayPts(curDay);pA=d.pA;pB=d.pB;}
  document.getElementById('lb-pta').textContent=Number.isInteger(pA)?pA:pA.toFixed(1);
  document.getElementById('lb-ptb').textContent=Number.isInteger(pB)?pB:pB.toFixed(1);
  renderPBar();
  const days=curDay==='total'?[1,2]:[curDay];
  let html='';
  days.forEach(day=>{
    const pairs=S.pairings?.[day]||[];
    if(curDay==='total')html+=`<div class="sh">TAG ${day}</div>`;
    if(!pairs.length){html+=`<div class="empty">Keine Paarungen für Tag ${day}</div>`;return;}
    pairs.forEach(p=>{
      const r=calcMatch({...p},day);
      const mL=p.mode==='matchplay'?'MATCHPLAY':p.mode==='bestball'?'BEST BALL':'STABLEFORD';
      const mC=p.mode==='matchplay'?'bm':p.mode==='bestball'?'bb':'bs';
      const bnL=p.bruttoNetto==='netto'?' · NETTO':' · BRUTTO';
      const nA=pName(p.playerA)+(p.mode==='bestball'&&p.playerA2?'/'+pName(p.playerA2):'');
      const nB=pName(p.playerB)+(p.mode==='bestball'&&p.playerB2?'/'+pName(p.playerB2):'');
      const hA=pHcp(p.playerA),hB=pHcp(p.playerB);
      let rh='';
      if(r.status==='open'){rh=`<div class="rpill rpo">Noch nicht gespielt</div>`;}
      else{
        let txt='',cls='rpd';
        if(p.mode==='matchplay'){
          const lead=r.lead||0;
          if(lead===0){txt='All Square';}
          else if(lead>0){txt=`${esc(nA.split(' ')[0])} ${lead} UP`;cls='rpa';}
          else{txt=`${esc(nB.split(' ')[0])} ${Math.abs(lead)} UP`;cls='rpb';}
          if(r.status==='A'||r.status==='B')txt+=' ✓';
        }else if(p.mode==='stableford'){
          txt=`${r.ptsA||0} – ${r.ptsB||0} Pkt`;
          cls=r.status==='A'?'rpa':r.status==='B'?'rpb':'rpd';
        }else{
          txt=`Loch ${r.played}/18`;
          cls=r.status==='A'?'rpa':r.status==='B'?'rpb':'rpd';
        }
        rh=`<div class="rpill ${cls}">${txt}</div>`;
      }
      html+=`<div class="pc" onclick="openSheet('${p.id}',${day})">
        <div><span class="mbadge ${mC}">${mL}${bnL}</span></div>
        <div class="pg">
          <div><div class="pna">${esc(nA)}</div><div class="phcp" style="text-align:right">Vorg. ${hA}</div></div>
          <div class="pvs">VS</div>
          <div><div class="pnb">${esc(nB)}</div><div class="phcp">Vorg. ${hB}</div></div>
        </div>
        <div class="pr">${rh}</div>
        ${(()=>{
          const hasA=p.scores&&p.scores.playerA&&p.scores.playerA.some(s=>s!=null);

          if(!hasA&&!hasB)return'';

            '</div>';
        })()}
      </div>`;
    });
  });
  document.getElementById('lb-pairs').innerHTML=html||
    '<div class="empty"><div style="font-size:40px">⛳</div><div style="margin-top:8px">Keine Paarungen</div><div style="font-size:11px;margin-top:4px">Admin öffnen zum Einrichten</div></div>';
}

// ═══════════════ SHEET ═══════════════
let sheetPid=null, sheetDay=null;

function openSheet(pid,day){
  sheetPid=pid; sheetDay=day;
  const p=getP(pid,day);if(!p)return;
  const nA=pName(p.playerA),nB=pName(p.playerB);
  const nA2=p.playerA2?pName(p.playerA2):'';
  const nB2=p.playerB2?pName(p.playerB2):'';
  const isBB=p.mode==='bestball';
  const titleTxt=isBB
    ?`${nA}${nA2?'/'+nA2:''} vs ${nB}${nB2?'/'+nB2:''}`
    :`${nA} vs ${nB}`;
  document.getElementById('sheet-title').textContent=titleTxt;
  const sel=document.getElementById('sheet-sel');
  // Relevante Optionen basierend auf angemeldetem Spieler
  let opts='';
  if(myId===p.playerA)       opts+=`<option value="playerA">🔴 ${esc(nA)} — meinen Score</option>`;
  if(isBB&&myId===p.playerA2)opts+=`<option value="playerA2">🔴 ${esc(nA2)} — meinen Score</option>`;
  if(myId===p.playerB)       opts+=`<option value="playerB">🔵 ${esc(nB)} — meinen Score</option>`;
  if(isBB&&myId===p.playerB2)opts+=`<option value="playerB2">🔵 ${esc(nB2)} — meinen Score</option>`;
  opts+=`<option value="both">✏️ Für beide eintragen</option>`;
  sel.innerHTML=opts;
  // Vorauswahl
  if(myId===p.playerA)       sel.value='playerA';
  else if(isBB&&myId===p.playerA2) sel.value='playerA2';
  else if(myId===p.playerB)  sel.value='playerB';
  else if(isBB&&myId===p.playerB2) sel.value='playerB2';
  else sel.value='both';
  document.getElementById('sheet').classList.add('on');
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('on');
}

function confirmSheet(){
  closeSheet();
  const pid=sheetPid, day=sheetDay;
  const p=getP(pid,day);if(!p)return;
  const role=document.getElementById('sheet-sel').value;
  const forBoth=(role==='both');
  // role kann sein: playerA, playerA2, playerB, playerB2, both
  const myRole=forBoth?'playerA':role; // bei forBoth irrelevant
  const isBB=p.mode==='bestball';

  // Session setzen
  CUR.pid=pid; CUR.day=day; CUR.role=myRole; CUR.forBoth=forBoth; CUR.tab='front';

  // Scores laden (alle 4 Slots für Best Ball)
  const sc=p.scores||{};
  CUR.scores={
    playerA:[...(sc.playerA||Array(18).fill(null))],
    playerA2:[...(sc.playerA2||Array(18).fill(null))],
    playerB:[...(sc.playerB||Array(18).fill(null))],
    playerB2:[...(sc.playerB2||Array(18).fill(null))]
  };

  // Header
  const nA=pName(p.playerA),nB=pName(p.playerB);
  const nA2=p.playerA2?pName(p.playerA2):'';
  const nB2=p.playerB2?pName(p.playerB2):'';
  const mode=p.mode||'matchplay';
  const mL=mode==='matchplay'?'Matchplay':mode==='bestball'?'Best Ball 2v2':'Stableford';
  let myName='beide';
  if(!forBoth){
    if(role==='playerA')myName=nA;
    else if(role==='playerA2')myName=nA2;
    else if(role==='playerB')myName=nB;
    else if(role==='playerB2')myName=nB2;
  }
  const titleA=nA+(nA2?' / '+nA2:'');
  const titleB=nB+(nB2?' / '+nB2:'');
  document.getElementById('sc-title').textContent=`${titleA} vs ${titleB}`;
  document.getElementById('sc-sub').textContent=`Du trägst ein: ${myName} · ${mL} · ${p.bruttoNetto==='netto'?'Netto':'Brutto'}`;

  // Column header — Best Ball hat 4 Spalten + Result
  let cw,colHtml;
  if(isBB){
    const isA2=myRole==='playerA'||myRole==='playerA2';
    cw=forBoth?'28px 1fr 1fr 1fr 1fr 50px':
       isA2?'28px 1fr 1fr 0.55fr 0.55fr 50px':
            '28px 0.55fr 0.55fr 1fr 1fr 50px';
    colHtml=`<span>LOCH</span>
      <span style="text-align:center;color:var(--ta)">${esc(nA.split(' ')[0])}</span>
      <span style="text-align:center;color:var(--ta)">${esc((nA2||'–').split(' ')[0])}</span>
      <span style="text-align:center;color:var(--tb)">${esc(nB.split(' ')[0])}</span>
      <span style="text-align:center;color:var(--tb)">${esc((nB2||'–').split(' ')[0])}</span>
      <span style="text-align:center">BEST</span>`;
  }else{
    cw=`32px 1fr 1fr ${mode==='matchplay'?'80px':'60px'}`;
    colHtml=`<span>LOCH</span><span style="text-align:center;color:var(--ta)">${esc(nA.split(' ')[0])}</span><span style="text-align:center;color:var(--tb)">${esc(nB.split(' ')[0])}</span><span style="text-align:center">RESULT</span>`;
  }
  const colh=document.getElementById('colh');
  colh.style.gridTemplateColumns=cw;
  colh.innerHTML=colHtml;

  // Auto-Tab: wenn mind. 9 Löcher gespielt → Back Nine
  const scArr=CUR.scores[CUR.role]||CUR.scores.playerA||[];
  const played=scArr.filter(s=>s!=null).length;
  const autoTab=played>=9?'back':'front';
  CUR.tab=autoTab;
  document.getElementById('stf').classList.toggle('on',autoTab==='front');
  document.getElementById('stb').classList.toggle('on',autoTab==='back');
  renderHoles();
  updateStatus();
  showView('score');
}

function setScTab(t){
  CUR.tab=t;
  document.getElementById('stf').classList.toggle('on',t==='front');
  document.getElementById('stb').classList.toggle('on',t==='back');
  renderHoles();
}

function renderHoles(){
  const p=getP(CUR.pid,CUR.day);if(!p)return;
  const c=getCourse(CUR.day);
  const par=c.par||DPAR,si=c.si||DSI;
  const hA=pHcp(p.playerA),hB=pHcp(p.playerB);
  const hA2=pHcp(p.playerA2||''),hB2=pHcp(p.playerB2||'');
  const mode=p.mode||'matchplay';
  const isBB=mode==='bestball';
  const bn=p.bruttoNetto||'brutto';
  const start=CUR.tab==='front'?0:9;
  const holes=Array.from({length:9},(_,i)=>start+i);
  // BB: eigene Spalten 1fr, Gegner-Spalten 0.55fr (schmaler)
  let cw;
  if(isBB){
    const isA=CUR.role==='playerA'||CUR.role==='playerA2';
    if(CUR.forBoth) cw='28px 1fr 1fr 1fr 1fr 50px';
    else if(isA)    cw='28px 1fr 1fr 0.55fr 0.55fr 50px'; // A edit, B schmal
    else            cw='28px 0.55fr 0.55fr 1fr 1fr 50px'; // B edit, A schmal
  }else{
    cw=`32px 1fr 1fr ${mode==='matchplay'?'80px':'60px'}`;
  }
  const editA=CUR.forBoth||CUR.role==='playerA';
  const editA2=CUR.forBoth||CUR.role==='playerA2';
  const editB=CUR.forBoth||CUR.role==='playerB';
  const editB2=CUR.forBoth||CUR.role==='playerB2';

  document.getElementById('sc-holes').innerHTML=holes.map(i=>{
    const pv=par[i]||4,siv=si[i]||i+1;
    const sA=CUR.scores.playerA[i];
    const sA2=CUR.scores.playerA2?CUR.scores.playerA2[i]:null;
    const sB=CUR.scores.playerB[i];
    const sB2=CUR.scores.playerB2?CUR.scores.playerB2[i]:null;
    const filled=sA!=null||sB!=null||(isBB&&(sA2!=null||sB2!=null));

    // Net scores
    const nA_=net(sA,i,hA,si),nB_=net(sB,i,hB,si);
    const nA2_=net(sA2,i,hA2,si),nB2_=net(sB2,i,hB2,si);

    // Hole result
    let hres='<span style="color:#aaa;font-size:11px">–</span>';
    if(isBB){
      // Best Ball: bestes von A1/A2 vs bestes von B1/B2
      const hasA=(sA!=null||sA2!=null),hasB=(sB!=null||sB2!=null);
      if(hasA&&hasB){
        const vA1=sA!=null?(bn==='netto'?nA_:sA):999;
        const vA2=sA2!=null?(bn==='netto'?nA2_:sA2):999;
        const vB1=sB!=null?(bn==='netto'?nB_:sB):999;
        const vB2=sB2!=null?(bn==='netto'?nB2_:sB2):999;
        const bA=Math.min(vA1,vA2),bB=Math.min(vB1,vB2);
        if(bA<bB)hres=`<span style="font-weight:900;color:var(--ta);font-size:13px">◀${bA}</span>`;
        else if(bB<bA)hres=`<span style="font-weight:900;color:var(--tb);font-size:13px">${bB}▶</span>`;
        else hres=`<span style="font-weight:700;color:#666;font-size:12px">½</span>`;
      }
    }else if(sA!=null&&sB!=null){
      const vA=bn==='netto'?nA_:sA;
      const vB=bn==='netto'?nB_:sB;
      if(mode==='matchplay'){
        if(vA<vB)hres=`<span style="font-weight:900;color:var(--ta);font-size:16px">◀</span>`;
        else if(vB<vA)hres=`<span style="font-weight:900;color:var(--tb);font-size:16px">▶</span>`;
        else hres=`<span style="font-weight:700;color:#666;font-size:14px">½</span>`;
      }else if(mode==='stableford'){
        const stA=stbl(nA_,pv),stB=stbl(nB_,pv);
        const col=stA>stB?'var(--ta)':stB>stA?'var(--tb)':'#666';
        hres=`<span style="font-size:12px;font-weight:700;color:${col}">${stA}:${stB}</span>`;
      }else{
        if(vA<vB)hres=`<span style="color:var(--ta);font-weight:700;font-size:14px">A</span>`;
        else if(vB<vA)hres=`<span style="color:var(--tb);font-weight:700;font-size:14px">B</span>`;
        else hres=`<span style="color:#666;font-weight:700;font-size:14px">½</span>`;
      }
    }

    // Stepper / readonly helpers
    const stH=46; // height for BB (smaller)
    // Bei Best Ball: eigene Felder normal, Gegner-Felder schmal (nur Zahl)
    const mkStep=(player,s,side)=>isBB
      ?`<div class="stepper" style="height:54px">
          <button class="stbtn" style="width:30px;font-size:22px;padding:0" ontouchstart="" onclick="step('${player}',${i},-1)">−</button>
          <div class="${s!=null?'stval':'stval e'}" style="font-size:26px;font-weight:900" id="sv-${side}-${i}">${s!=null?s:'–'}</div>
          <button class="stbtn" style="width:30px;font-size:22px;padding:0" ontouchstart="" onclick="step('${player}',${i},+1)">+</button>
        </div>`
      :`<div class="stepper" style="height:64px">
          <button class="stbtn" style="font-size:34px;width:54px" ontouchstart="" onclick="step('${player}',${i},-1)">−</button>
          <div class="${s!=null?'stval':'stval e'}" style="font-size:36px;font-weight:900" id="sv-${side}-${i}">${s!=null?s:'–'}</div>
          <button class="stbtn" style="font-size:34px;width:54px" ontouchstart="" onclick="step('${player}',${i},+1)">+</button>
        </div>`;
    // Readonly: bei BB sehr schmal — nur Zahl + Auge
    const mkRO=(s,side)=>isBB
      ?`<div style="display:flex;align-items:center;justify-content:center;height:44px;
          background:#f0f4f8;border-radius:8px;border:1px solid #d0dde8;
          font-size:17px;font-weight:700;color:${s!=null?'var(--txt)':'#ccc'};
          position:relative" id="sv-${side}-${i}">
          ${s!=null?s:'–'}<span style="position:absolute;top:2px;right:3px;font-size:8px;color:#aaa">👁</span>
        </div>`
      :`<div class="${s!=null?'readonly':'readonly e'}" style="height:50px" id="sv-${side}-${i}">
          ${s!=null?s:'–'}<span class="eye">👁</span>
        </div>`;

    const colA =editA ?mkStep('playerA', sA, 'A') :mkRO(sA, 'A');
    const colA2=isBB?(editA2?mkStep('playerA2',sA2,'A2'):mkRO(sA2,'A2')):'';
    const colB =editB ?mkStep('playerB', sB, 'B') :mkRO(sB, 'B');
    const colB2=isBB?(editB2?mkStep('playerB2',sB2,'B2'):mkRO(sB2,'B2')):'';

    return`<div class="hrow${filled?' filled':''}" style="grid-template-columns:${cw}">
      <div class="hinfo"><div class="hnum">${i+1}</div><div class="hpar">P${pv}·SI${siv}</div></div>
      ${colA}${colA2}
      ${colB}${colB2}
      <div class="hres">${hres}</div>
    </div>`;
  }).join('');
}

function step(player,idx,delta){
  // Sicherheit: nur editierbare Seite
  if(!CUR.forBoth&&player!==CUR.role)return;
  const c=getCourse(CUR.day);
  const par=c.par||DPAR;
  const cur=CUR.scores[player][idx];
  let next=cur==null?(par[idx]||4):cur+delta;
  if(next<1)next=1;if(next>15)next=15;
  CUR.scores[player][idx]=next;
  const side=player==='playerA'?'A':'B';
  const el=document.getElementById(`sv-${side}-${idx}`);
  if(el){el.textContent=next;el.className='stval';}
  renderHoles();
  updateStatus();
}

function updateStatus(){
  const p=getP(CUR.pid,CUR.day);if(!p)return;
  const c=getCourse(CUR.day);
  const par=c.par||DPAR,si=c.si||DSI;
  const hA=pHcp(p.playerA),hB=pHcp(p.playerB);
  const mode=p.mode||'matchplay';
  const bn=p.bruttoNetto||'brutto';
  const r=calcMatch({...p,scores:CUR.scores},CUR.day);
  const nA=pName(p.playerA).split(' ')[0];
  const nB=pName(p.playerB).split(' ')[0];
  const pill=document.getElementById('sc-pill');
  const plbl=document.getElementById('sc-plbl');
  const bar=document.getElementById('mbar');

  if(mode==='matchplay'){
    const lead=r.lead||0,left=18-(r.played||0);
    let txt='',bg='#e0e0e0',col='#333';
    if(!r.played){txt='Noch kein Loch';}
    else if(lead===0){txt='ALL SQUARE';}
    else if(lead>0){txt=`${nA} ${lead} UP`;bg='var(--ta)';col='#fff';if(lead>left)txt+=` — GEWONNEN 🏆`;}
    else{txt=`${nB} ${Math.abs(lead)} UP`;bg='var(--tb)';col='#fff';if(Math.abs(lead)>left)txt+=` — GEWONNEN 🏆`;}
    bar.style.display='block';bar.style.background=bg;bar.style.color=col;
    bar.textContent=txt+(r.played>0?` · Loch ${r.played}/18`:'');
    pill.textContent=lead===0?'A/S':lead>0?`${lead}↑A`:`${Math.abs(lead)}↑B`;
    pill.style.color=lead>0?'var(--ta)':lead<0?'var(--tb)':'#666';
    plbl.textContent='Matchstand';
  }else if(mode==='stableford'){
    const bg=r.status==='A'?'var(--ta)':r.status==='B'?'var(--tb)':'#888';
    bar.style.display='block';bar.style.background=bg;bar.style.color='#fff';
    bar.textContent=`${nA}: ${r.ptsA||0} Pkt  —  ${nB}: ${r.ptsB||0} Pkt`;
    pill.textContent=`${r.ptsA||0}:${r.ptsB||0}`;pill.style.color='var(--txt)';plbl.textContent='Punkte';
  }else{
    bar.style.display='none';pill.textContent='–';plbl.textContent='Stand';
  }
}

async function saveScore(){
  const btn=document.getElementById('savebtn');
  btn.disabled=true;btn.textContent='Speichere…';
  const p=getP(CUR.pid,CUR.day);if(!p){btn.disabled=false;return;}
  const existing=p.scores||{};
  let newScores;
  if(CUR.forBoth){
    newScores={
      playerA:[...CUR.scores.playerA],
      playerA2:[...CUR.scores.playerA2],
      playerB:[...CUR.scores.playerB],
      playerB2:[...CUR.scores.playerB2]
    };
  }else{
    // Nur eigene Rolle speichern, Rest behalten
    newScores={
      playerA: CUR.role==='playerA'?[...CUR.scores.playerA]:[...(existing.playerA||Array(18).fill(null))],
      playerA2:CUR.role==='playerA2'?[...CUR.scores.playerA2]:[...(existing.playerA2||Array(18).fill(null))],
      playerB: CUR.role==='playerB'?[...CUR.scores.playerB]:[...(existing.playerB||Array(18).fill(null))],
      playerB2:CUR.role==='playerB2'?[...CUR.scores.playerB2]:[...(existing.playerB2||Array(18).fill(null))]
    };
  }
  S.pairings[CUR.day]=S.pairings[CUR.day].map(px=>
    px.id!==CUR.pid?px:{...px,scores:newScores}
  );
  try{
    await window._fb('rc',S);
    toast('✅ Score gespeichert');
  }catch(e){toast('⚠️ Fehler beim Speichern');}
  btn.disabled=false;btn.textContent='Score speichern ✓';
  // Auf Scorecard bleiben
  renderHoles();
  updateStatus();
}

// ═══════════════ VIEW ═══════════════
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='admin')initAdmin();
  if(name==='lb')renderLB();
}

// ═══════════════ ADMIN ═══════════════
function initAdmin(){
  document.getElementById('a-name').value=S.eventName||'';
  document.getElementById('a-d1').value=S.date1||today();
  document.getElementById('a-d2').value=S.date2||today();
  document.getElementById('a-ta').value=S.teamA?.name||'Team Rot';
  document.getElementById('a-tb').value=S.teamB?.name||'Team Blau';
  [1,2].forEach(d=>{
    const c=S.courses?.[d]||{};
    document.getElementById(`ac${d}n`).value=c.name||'';
    document.getElementById(`ac${d}p`).value=c.par?(c.par.reduce((a,b)=>a+b,0)||''):'';
    document.getElementById(`ac${d}si`).value=c.si?c.si.join(','):'';
  });
  renderAP();renderAPairs();
  sbGet('courses?select=*&order=name').then(cs=>{
    [1,2].forEach(d=>{
      const sel=document.getElementById(`ac${d}s`);if(!sel)return;
      sel.innerHTML='<option value="">— Gespeicherten Platz laden —</option>'+
        (cs||[]).map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
    });
  }).catch(()=>{});
}

async function loadCourse(day,name){
  if(!name)return;
  try{
    const cs=await sbGet('courses?select=*&order=name');
    const c=(cs||[]).find(x=>x.name===name);if(!c)return;
    const par=JSON.parse(c.par||'[]');
    const si=JSON.parse(c.stroke_index||'[]');
    document.getElementById(`ac${day}n`).value=c.name;
    document.getElementById(`ac${day}p`).value=par.reduce((a,b)=>a+b,0)||72;
    document.getElementById(`ac${day}si`).value=si.join(',');
    toast('✓ '+c.name);
  }catch(e){toast('⚠️ Fehler');}
}

function renderAP(){
  ['a','b'].forEach(t=>{
    const ps=(t==='a'?S.teamA:S.teamB)?.players||[];
    document.getElementById(`apl-${t}`).innerHTML=ps.map(p=>`
      <div class="prow">
        <div class="pcell">${esc(p.name)}</div>
        <input class="inp" type="number" step="0.1" value="${p.hcp||''}" placeholder="Vorg."
          style="text-align:center;padding:8px 4px;font-size:14px"
          oninput="updH('${t}','${p.id}',this.value)">
        <button class="rmbtn" onclick="rmP('${t}','${p.id}')">×</button>
      </div>`).join('');
  });
}

function addP(t){
  const n=document.getElementById(`np-${t}`).value.trim();if(!n)return;
  const h=document.getElementById(`nh-${t}`).value;
  const p={id:uid(),name:n,hcp:Number(h)||0};
  if(t==='a')S.teamA.players=[...(S.teamA.players||[]),p];
  else S.teamB.players=[...(S.teamB.players||[]),p];
  document.getElementById(`np-${t}`).value='';
  document.getElementById(`nh-${t}`).value='';
  renderAP();renderAPairs();
}

function rmP(t,id){
  if(!confirm('Spieler wirklich löschen?'))return;
  if(t==='a')S.teamA.players=(S.teamA.players||[]).filter(p=>p.id!==id);
  else S.teamB.players=(S.teamB.players||[]).filter(p=>p.id!==id);
  renderAP();renderAPairs();
}

function updH(t,id,v){
  const ps=t==='a'?S.teamA.players:S.teamB.players;
  const p=ps?.find(p=>p.id===id);if(p)p.hcp=Number(v)||0;
}

function setPD(d){
  admPDay=d;
  document.querySelectorAll('.dtab').forEach((b,i)=>b.classList.toggle('on',i+1===d));
  renderAPairs();
}

function renderAPairs(){
  const pairs=(S.pairings?.[admPDay])||[];
  const pA=S.teamA?.players||[];
  const pB=S.teamB?.players||[];
  const optA='<option value="">– '+(S.teamA?.name||'A')+' –</option>'+pA.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  const optB='<option value="">– '+(S.teamB?.name||'B')+' –</option>'+pB.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  document.getElementById('a-pairs').innerHTML=pairs.map((p,i)=>{
    const modes=['matchplay','bestball','stableford'];
    const bns=['brutto','netto'];
    const isBB=p.mode==='bestball';
    // Best Ball: zweiter Spieler pro Team
    const bb2A=isBB?`
      <div style="font-size:9px;color:var(--ta);letter-spacing:1px;margin:6px 0 4px;font-weight:700">PARTNER ${S.teamA?.name||'A'}</div>
      <select class="inp" style="padding:8px;font-size:13px" onchange="updPair(${i},'playerA2',this.value)">
        ${optA.replace(`value="${p.playerA2||''}"`,`value="${p.playerA2||''}" selected`)}
      </select>`:'';
    const bb2B=isBB?`
      <div style="font-size:9px;color:var(--tb);letter-spacing:1px;margin:6px 0 4px;font-weight:700">PARTNER ${S.teamB?.name||'B'}</div>
      <select class="inp" style="padding:8px;font-size:13px" onchange="updPair(${i},'playerB2',this.value)">
        ${optB.replace(`value="${p.playerB2||''}"`,`value="${p.playerB2||''}" selected`)}
      </select>`:'';
    return`<div class="padm">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:var(--txt2)">Paarung ${i+1}${isBB?' · 2v2':''}</div>
        <button onclick="rmPair(${i})" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer;font-weight:700">×</button>
      </div>
      <div class="padm-r">
        <div>
          <div style="font-size:9px;color:var(--ta);letter-spacing:1px;margin-bottom:4px;font-weight:700">${S.teamA?.name||'TEAM A'}</div>
          <select class="inp" style="padding:8px;font-size:13px;margin-bottom:4px" onchange="updPair(${i},'playerA',this.value)">
            ${optA.replace(`value="${p.playerA}"`,`value="${p.playerA}" selected`)}
          </select>
          ${bb2A}
        </div>
        <div style="text-align:center;font-size:12px;font-weight:700;color:var(--txt3);padding-top:20px">VS</div>
        <div>
          <div style="font-size:9px;color:var(--tb);letter-spacing:1px;margin-bottom:4px;font-weight:700">${S.teamB?.name||'TEAM B'}</div>
          <select class="inp" style="padding:8px;font-size:13px;margin-bottom:4px" onchange="updPair(${i},'playerB',this.value)">
            ${optB.replace(`value="${p.playerB}"`,`value="${p.playerB}" selected`)}
          </select>
          ${bb2B}
        </div>
      </div>
      <div style="font-size:9px;color:var(--txt3);letter-spacing:1px;margin-bottom:4px;margin-top:8px">SPIELMODUS</div>
      <div class="chips">
        ${modes.map(m=>`<button class="chip${p.mode===m?' on':''}" onclick="updPair(${i},'mode','${m}');renderAPairs()">${m==='matchplay'?'Matchplay':m==='bestball'?'Best Ball 2v2':'Stableford'}</button>`).join('')}
      </div>
      <div style="font-size:9px;color:var(--txt3);letter-spacing:1px;margin-bottom:4px;margin-top:8px">WERTUNG</div>
      <div class="chips">
        ${bns.map(bn=>`<button class="chip${p.bruttoNetto===bn?' on':''}" onclick="updPair(${i},'bruttoNetto','${bn}')">${bn==='brutto'?'Brutto':'Netto'}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function addPair(){
  if(!S.pairings)S.pairings={1:[],2:[]};
  if(!S.pairings[admPDay])S.pairings[admPDay]=[];
  S.pairings[admPDay].push({id:uid(),playerA:'',playerA2:'',playerB:'',playerB2:'',mode:'matchplay',bruttoNetto:'brutto',scores:null});
  renderAPairs();
}

function rmPair(i){
  if(!confirm('Paarung löschen?'))return;
  S.pairings[admPDay].splice(i,1);renderAPairs();
}

function updPair(i,f,v){
  if(!S.pairings[admPDay][i])return;
  S.pairings[admPDay][i][f]=v;renderAPairs();
}

function resetAll(){
  if(!confirm('Alles zurücksetzen? Alle Scores werden gelöscht!'))return;
  S={eventName:'Ryder Cup Elkofen',date1:today(),date2:today(),
    teamA:{name:'Team Rot',players:[]},teamB:{name:'Team Blau',players:[]},
    courses:{1:{name:'',par:[...DPAR],si:[...DSI]},2:{name:'',par:[...DPAR],si:[...DSI]}},
    pairings:{1:[],2:[]}};
  initAdmin();
}

async function saveAdmin(){
  [1,2].forEach(d=>{
    const name=document.getElementById(`ac${d}n`).value||'';
    const siRaw=document.getElementById(`ac${d}si`).value;
    let si=siRaw?siRaw.split(',').map(Number).filter(n=>n>0):[];
    if(si.length<18)si=[...DSI];
    S.courses[d]={name,par:[...DPAR],si:si.slice(0,18)};
  });
  S.eventName=document.getElementById('a-name').value||'Ryder Cup Elkofen';
  S.date1=document.getElementById('a-d1').value||today();
  S.date2=document.getElementById('a-d2').value||today();
  S.teamA.name=document.getElementById('a-ta').value||'Team Rot';
  S.teamB.name=document.getElementById('a-tb').value||'Team Blau';
  try{await window._fb('rc',S);toast('✅ Gespeichert');}
  catch(e){toast('⚠️ Firebase nicht erreichbar');}
  showView('lb');
}
</script>

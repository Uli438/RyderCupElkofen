<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🏆 Ryder Cup Elkofen</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#daeeff;--bg2:#c8e6fa;--bg3:#b8d8f5;
  --card:#fff;--border:#2c2c2c;--border-light:#8bb8d8;
  --txt:#111;--txt2:#334455;--txt3:#556677;
  --accent:#1565c0;--accent2:#0d47a1;
  --green:#2e7d32;--red:#c62828;
  --ta:#c62828;--tb:#1565c0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input,select,button{font-family:'DM Sans',sans-serif}
.serif{font-family:'Cormorant Garamond',serif}
.view{display:none;flex-direction:column;min-height:100vh}
.view.active{display:flex}

/* hero */
.hero{background:linear-gradient(135deg,#1a237e 0%,#c62828 100%);padding:24px 16px 18px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.12);pointer-events:none}
.hero-inner{position:relative;z-index:1}
.hero-eye{font-size:10px;color:rgba(255,255,255,0.7);letter-spacing:3px;margin-bottom:3px;font-weight:700}
.hero-title{font-size:26px;color:#fff;font-weight:700;line-height:1.1}
.hero-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:3px}
.hero-tabs{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;align-items:center}
.htab{padding:5px 12px;border-radius:20px;border:2px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.htab.active{background:#fff;color:var(--accent)}
.htab.adm{margin-left:auto;background:rgba(0,0,0,0.2);border-color:rgba(255,255,255,0.3)}

/* player bar */
.player-bar{background:var(--card);border-bottom:2px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.player-bar-lbl{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;white-space:nowrap}
.player-sel{flex:1;background:var(--card);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:14px;font-weight:600;padding:8px 12px;outline:none;cursor:pointer}
.player-sel:focus{border-color:var(--accent)}

/* scoreboard */
.scoreboard{background:linear-gradient(135deg,#1a237e,#c62828);padding:14px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;border-bottom:2px solid var(--border)}
.tsb{text-align:center}
.tsb-name{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.65)}
.tsb-pts{font-size:40px;font-weight:900;line-height:1;font-family:'Cormorant Garamond',serif}
.tsb-pts.a{color:#ffcdd2}
.tsb-pts.b{color:#bbdefb}
.vsb{text-align:center;color:rgba(255,255,255,0.55);font-size:12px;font-weight:700}
.vsb-day{font-size:9px;color:rgba(255,255,255,0.45);margin-top:2px;letter-spacing:1px}

/* pairings */
.sec-head{padding:9px 16px 6px;font-size:9px;color:var(--accent);letter-spacing:2px;font-weight:700;background:var(--bg2);border-bottom:1px solid var(--border-light)}
.pair-card{background:var(--card);border-bottom:1px solid var(--border-light);padding:12px 16px;cursor:pointer}
.pair-card:active{background:#e3f2fd}
.mode-badge{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:1px;margin-bottom:6px}
.bm{background:#fff3e0;color:#e65100;border:1px solid #e65100}
.bb{background:#f3e5f5;color:#6a1b9a;border:1px solid #6a1b9a}
.bs{background:#e8f5e9;color:#2e7d32;border:1px solid #2e7d32}
.pair-grid{display:grid;grid-template-columns:1fr 28px 1fr;align-items:center;gap:4px}
.pname{font-size:15px;font-weight:700;font-family:'Cormorant Garamond',serif}
.pname.a{color:var(--ta);text-align:right}
.pname.b{color:var(--tb);text-align:left}
.phcp{font-size:10px;color:var(--txt3)}
.phcp.a{text-align:right}
.pvs{text-align:center;font-size:11px;font-weight:700;color:var(--txt3)}
.pair-result{margin-top:8px;display:flex;justify-content:center}
.rpill{padding:3px 14px;border-radius:20px;font-size:11px;font-weight:700}
.rpa{background:#ffebee;color:var(--ta);border:1px solid var(--ta)}
.rpb{background:#e3f2fd;color:var(--tb);border:1px solid var(--tb)}
.rpd{background:#f5f5f5;color:#555;border:1px solid #999}
.rpo{background:#fff8e1;color:#f57f17;border:1px solid #f57f17}
.rpc{background:#fff3e0;color:#e65100;border:1px solid #e65100}
.empty-pairs{text-align:center;padding:50px 20px;color:var(--txt3)}

/* header */
.hdr{background:var(--bg2);border-bottom:2px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
.back{background:none;border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1;font-weight:700}
.hdr-t{font-size:17px;color:var(--txt);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-s{font-size:10px;color:var(--txt2)}
.status-pill{text-align:center;flex-shrink:0}
.sp-val{font-size:18px;font-weight:900;line-height:1;font-family:'Cormorant Garamond',serif}
.sp-lbl{font-size:9px;color:var(--txt3)}

/* live match bar */
.match-bar{padding:10px 16px;text-align:center;font-weight:900;font-size:17px;font-family:'Cormorant Garamond',serif;border-bottom:2px solid var(--border);transition:background .3s}

/* score tabs */
.sc-tabs{display:flex;background:var(--bg2);border-bottom:2px solid var(--border)}
.sc-tab{flex:1;padding:9px 0;background:none;border:none;border-bottom:3px solid transparent;color:var(--txt2);font-size:11px;letter-spacing:1.5px;cursor:pointer;font-weight:600}
.sc-tab.active{border-bottom-color:var(--accent);color:var(--accent)}
.col-head{display:grid;padding:7px 14px 4px;gap:6px;font-size:9px;color:var(--txt3);letter-spacing:1px;background:var(--bg2);border-bottom:1px solid var(--border-light)}
.hole-row{display:grid;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border-light);background:var(--card)}
.hole-row.filled{background:#e8f4fd}
.hole-row.conflict{background:#fff5f5;border-left:4px solid var(--red)}
.hole-info{text-align:center}
.hole-num{font-size:14px;font-weight:700;color:var(--txt)}
.hole-par{font-size:9px;color:var(--txt3)}
.stepper{display:flex;align-items:center;background:var(--card);border:2px solid var(--border);border-radius:10px;overflow:hidden;height:50px}
.stbtn{background:none;border:none;color:var(--accent);font-size:28px;width:48px;height:50px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;user-select:none;touch-action:manipulation;font-weight:900}
.stbtn:active{background:#bbdefb}
.stval{flex:1;text-align:center;font-size:22px;font-weight:700;color:var(--txt);font-family:'Cormorant Garamond',serif}
.stval.empty{color:#aaa;font-size:15px}
.hole-res{text-align:center;display:flex;align-items:center;justify-content:center}
.save-wrap{position:fixed;bottom:0;left:0;right:0;padding:12px 16px 22px;background:linear-gradient(transparent,var(--bg) 40%)}
.save-btn{width:100%;padding:14px 0;border:3px solid #1b5e20;border-radius:12px;color:#fff;font-size:18px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#2e7d32,#43a047);box-shadow:0 6px 20px rgba(46,125,50,0.4)}
.save-btn:disabled{background:#aaa;border-color:#aaa;box-shadow:none}

/* conflict warning */
.conflict-bar{background:#ffebee;border:2px solid var(--red);border-radius:10px;padding:10px 14px;margin:10px 14px;font-size:12px;color:var(--red);font-weight:700}

/* admin */
.admin-body{padding:16px;display:flex;flex-direction:column;gap:16px;padding-bottom:40px}
.slabel{font-size:9px;color:var(--accent);letter-spacing:2px;margin-bottom:8px;font-weight:700}
.shint{font-size:10px;color:var(--txt2);margin-bottom:8px;line-height:1.5}
.inp{background:var(--card);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:15px;padding:11px 14px;outline:none;width:100%}
.inp:focus{border-color:var(--accent)}
.row2{display:flex;gap:8px}
.row2 .inp{flex:1}
.team-box{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.team-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.team-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.prow{display:grid;grid-template-columns:1fr 80px 36px;gap:6px;margin-bottom:6px;align-items:center}
.pcell{padding:9px 12px;background:var(--bg2);border:1px solid var(--border-light);border-radius:8px;font-size:14px;font-weight:600}
.rmbtn{background:#ffebee;border:2px solid var(--red);border-radius:8px;color:var(--red);font-size:16px;padding:7px;cursor:pointer;line-height:1;font-weight:700}
.addrow{display:grid;grid-template-columns:1fr 80px auto;gap:6px;margin-top:4px}
.addbtn{border:none;border-radius:10px;color:#fff;font-size:20px;padding:0 14px;cursor:pointer;line-height:1;font-weight:700}
.pair-adm{background:var(--card);border:2px solid var(--border-light);border-radius:10px;padding:12px;margin-bottom:8px}
.pair-adm-row{display:grid;grid-template-columns:1fr 28px 1fr;gap:6px;align-items:center;margin-bottom:8px}
.mode-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:20px;border:2px solid var(--border-light);background:var(--card);font-size:11px;font-weight:700;cursor:pointer;color:var(--txt2)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.day-tabs{display:flex;background:var(--bg2);border:2px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.dtab{flex:1;padding:10px 0;background:none;border:none;color:var(--txt2);font-size:12px;cursor:pointer;font-weight:700}
.dtab.active{background:var(--accent);color:#fff}
.rstbtn{background:#ffebee;border:2px solid var(--red);border-radius:10px;color:var(--red);font-size:14px;padding:11px;cursor:pointer;width:100%;font-weight:600}
.primbtn{background:linear-gradient(135deg,var(--green),#43a047);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;padding:13px;cursor:pointer;box-shadow:0 4px 14px rgba(46,125,50,0.3);width:100%}
.cdrop{width:100%;background:var(--card);border:2px solid var(--border);border-radius:10px;color:var(--txt);font-size:15px;padding:11px 14px;outline:none;cursor:pointer;margin-bottom:8px}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- ══ LEADERBOARD ══ -->
<div id="view-lb" class="view active">
  <div class="hero">
    <div class="hero-inner">
      <div class="hero-eye">🏆 RYDER CUP</div>
      <div class="hero-title serif" id="lb-name">Ryder Cup Elkofen</div>
      <div class="hero-sub" id="lb-sub">Admin öffnen zum Einrichten</div>
      <div class="hero-tabs">
        <button class="htab active" data-day="1" onclick="setDay(1)">TAG 1</button>
        <button class="htab" data-day="2" onclick="setDay(2)">TAG 2</button>
        <button class="htab" data-day="total" onclick="setDay('total')">GESAMT</button>
        <button class="htab adm" onclick="showView('admin')">⚙ Admin</button>
      </div>
    </div>
  </div>

  <!-- Spieler-Auswahl -->
  <div class="player-bar" id="player-bar" style="display:none">
    <div class="player-bar-lbl">ICH BIN:</div>
    <select class="player-sel" id="player-sel" onchange="setMe(this.value)">
      <option value="">— Spieler auswählen —</option>
    </select>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="tsb">
      <div class="tsb-name" id="lb-ta">TEAM A</div>
      <div class="tsb-pts a serif" id="lb-pta">0</div>
    </div>
    <div class="vsb">VS<div class="vsb-day" id="lb-day">TAG 1</div></div>
    <div class="tsb">
      <div class="tsb-name" id="lb-tb">TEAM B</div>
      <div class="tsb-pts b serif" id="lb-ptb">0</div>
    </div>
  </div>

  <div class="sec-head" id="lb-shead">PAARUNGEN</div>
  <div id="lb-pairs" style="padding-bottom:20px"></div>
</div>

<!-- ══ SCORE ENTRY ══ -->
<div id="view-score" class="view">
  <div class="hdr">
    <button class="back" onclick="showView('lb')">←</button>
    <div style="flex:1;min-width:0">
      <div class="hdr-t" id="sc-title"></div>
      <div class="hdr-s" id="sc-sub"></div>
    </div>
    <div class="status-pill">
      <div class="sp-val serif" id="sc-spill">–</div>
      <div class="sp-lbl" id="sc-slbl">Stand</div>
    </div>
  </div>
  <div class="match-bar" id="match-bar" style="display:none"></div>
  <div id="conflict-warn" style="display:none" class="conflict-bar"></div>
  <div class="sc-tabs">
    <button class="sc-tab active" id="sct-front" onclick="scTab('front')">FRONT 9 (1–9)</button>
    <button class="sc-tab" id="sct-back" onclick="scTab('back')">BACK 9 (10–18)</button>
  </div>
  <div class="col-head" id="sc-colhead"></div>
  <div id="sc-holes"></div>
  <div style="height:82px"></div>
  <div class="save-wrap">
    <button class="save-btn serif" id="savebtn" onclick="saveScore()">Score speichern ✓</button>
  </div>
</div>

<!-- ══ ADMIN ══ -->
<div id="view-admin" class="view">
  <div class="hdr">
    <button class="back" onclick="showView('lb')">←</button>
    <div class="hdr-t serif">⚙ Admin</div>
  </div>
  <div class="admin-body">

    <section>
      <div class="slabel">EVENT</div>
      <input class="inp" id="a-name" placeholder="z.B. Ryder Cup Elkofen 2025" style="margin-bottom:8px">
      <div class="row2">
        <input class="inp" type="date" id="a-d1">
        <input class="inp" type="date" id="a-d2">
      </div>
    </section>

    <section>
      <div class="slabel">PLÄTZE</div>
      <div style="font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:600">TAG 1</div>
      <select class="cdrop" id="a-c1-sel" onchange="loadCourse(1,this.value)"><option value="">— Gespeicherten Platz laden —</option></select>
      <input class="inp" id="a-c1-name" placeholder="Platzname Tag 1" style="margin-bottom:4px">
      <div class="row2" style="margin-bottom:10px">
        <input class="inp" type="number" id="a-c1-par" placeholder="Par (z.B. 72)">
        <input class="inp" id="a-c1-si" placeholder="SI 1–18 (kommagetrennt)" style="font-size:12px">
      </div>
      <div style="font-size:10px;color:var(--txt3);margin-bottom:4px;font-weight:600">TAG 2</div>
      <select class="cdrop" id="a-c2-sel" onchange="loadCourse(2,this.value)"><option value="">— Gespeicherten Platz laden —</option></select>
      <input class="inp" id="a-c2-name" placeholder="Platzname Tag 2" style="margin-bottom:4px">
      <div class="row2">
        <input class="inp" type="number" id="a-c2-par" placeholder="Par (z.B. 72)">
        <input class="inp" id="a-c2-si" placeholder="SI 1–18 (kommagetrennt)" style="font-size:12px">
      </div>
    </section>

    <section>
      <div class="slabel">TEAMS & SPIELER</div>
      <div class="team-box">
        <div class="team-hdr">
          <div class="team-dot" style="background:var(--ta)"></div>
          <input class="inp" id="a-ta" placeholder="Team A Name" style="border:none;background:none;padding:0;font-size:17px;font-weight:700;color:var(--ta)">
        </div>
        <div id="a-pl-a"></div>
        <div class="addrow">
          <input class="inp" id="np-a" placeholder="Spieler Name">
          <input class="inp" id="nh-a" type="number" step="0.1" placeholder="Vorg." style="text-align:center;padding:8px 4px">
          <button class="addbtn" style="background:var(--ta)" onclick="addP('a')">+</button>
        </div>
      </div>
      <div class="team-box">
        <div class="team-hdr">
          <div class="team-dot" style="background:var(--tb)"></div>
          <input class="inp" id="a-tb" placeholder="Team B Name" style="border:none;background:none;padding:0;font-size:17px;font-weight:700;color:var(--tb)">
        </div>
        <div id="a-pl-b"></div>
        <div class="addrow">
          <input class="inp" id="np-b" placeholder="Spieler Name">
          <input class="inp" id="nh-b" type="number" step="0.1" placeholder="Vorg." style="text-align:center;padding:8px 4px">
          <button class="addbtn" style="background:var(--tb)" onclick="addP('b')">+</button>
        </div>
      </div>
    </section>

    <section>
      <div class="slabel">PAARUNGEN</div>
      <div class="day-tabs">
        <button class="dtab active" onclick="setPDay(1)">TAG 1</button>
        <button class="dtab" onclick="setPDay(2)">TAG 2</button>
      </div>
      <div id="a-pairs"></div>
      <button onclick="addPair()" style="width:100%;padding:10px;background:var(--bg2);border:2px dashed var(--accent);border-radius:10px;color:var(--accent);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px">+ Paarung hinzufügen</button>
    </section>

    <button class="rstbtn" onclick="resetAll()">Alles zurücksetzen</button>
    <button class="primbtn serif" onclick="saveAdmin()">Speichern & Starten ✓</button>
  </div>
</div>

  return r.json();
}

// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const DPAR=[4,5,3,4,4,3,5,4,4,4,4,3,5,4,3,4,5,4];
const DSI=[7,1,15,11,5,17,3,9,13,8,2,16,12,6,18,4,10,14];

function today(){return new Date().toISOString().slice(0,10);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function dc(d){if(d<=-2)return'#f4c430';if(d===-1)return'#4ade80';if(d===0)return'#94a3b8';if(d===1)return'#fb923c';return'#f87171';}
function dl(d){if(d<=-2)return'Eagle';if(d===-1)return'Birdie';if(d===0)return'Par';if(d===1)return'Bogey';if(d===2)return'Double';return`+${d}`;}
function fmt(d){return d>0?`+${d}`:d===0?'E':`${d}`;}

function xStr(idx,hcp,si){
  const s=(si||DSI)[idx]||idx+1;
  const h=Math.round(Math.abs(hcp))*(hcp<0?-1:1);
  if(h>=0)return Math.floor(h/18)+(h%18>=s?1:0);
  const a=Math.abs(h);return-(Math.floor(a/18)+(a%18>=s?1:0));
}
function netto(b,idx,hcp,si){return b==null?null:b-xStr(idx,hcp,si);}
function stbl(net,par){if(net==null)return 0;const d=net-par;if(d>=2)return 0;if(d===1)return 1;if(d===0)return 2;if(d===-1)return 3;if(d===-2)return 4;return 5;}

// ══════════════════════════════════════════════
// SCORING MATH
// ══════════════════════════════════════════════
function calcResult(p,day){
  if(!p)return{ptA:0,ptB:0,status:'open'};
  const sc=p.scores||{};
  const hA=pHcp(p.playerA),hB=pHcp(p.playerB);
  const c=getCourse(day||1);
  const par=c.par||DPAR,si=c.si||DSI;
  const bn=p.bruttoNetto||'brutto';
  const mode=p.mode||'matchplay';

  if(mode==='matchplay') return calcMatchplay(sc,hA,hB,par,si,bn,p);
  if(mode==='bestball')  return calcBestball(sc,hA,hB,par,si,bn);
  return calcStableford(sc,hA,hB,par,si);
}

function calcMatchplay(sc,hA,hB,par,si,bn,p){
  const sA=sc.playerA||Array(18).fill(null);
  const sB=sc.playerB||Array(18).fill(null);
  let wA=0,wB=0,played=0;
  for(let i=0;i<18;i++){
    if(sA[i]==null||sB[i]==null)continue;
    played++;
    const vA=bn==='netto'?netto(sA[i],i,hA,si):sA[i];
    const vB=bn==='netto'?netto(sB[i],i,hB,si):sB[i];
    if(vA<vB)wA++;else if(vB<vA)wB++;
  }
  const lead=wA-wB,left=18-played;
  let status='open';
  if(played>0){
    if(lead>left)status='A';
    else if(-lead>left)status='B';
    else if(played===18&&lead===0)status='draw';
    else if(played===18)status=lead>0?'A':'B';
    else status='running';
  }
  const ptA=status==='A'?1:status==='draw'?0.5:0;
  const ptB=status==='B'?1:status==='draw'?0.5:0;
  return{ptA,ptB,status,lead,played,wA,wB};
}

function calcBestball(sc,hA,hB,par,si,bn){
  const sA=sc.playerA||Array(18).fill(null);
  const sB=sc.playerB||Array(18).fill(null);
  let ptA=0,ptB=0,played=0;
  for(let i=0;i<18;i++){
    if(sA[i]==null||sB[i]==null)continue;
    played++;
    const vA=bn==='netto'?netto(sA[i],i,hA,si):sA[i];
    const vB=bn==='netto'?netto(sB[i],i,hB,si):sB[i];
    if(vA<vB)ptA++;else if(vB<vA)ptB++;else{ptA+=0.5;ptB+=0.5;}
  }
  const done=played===18;
  const status=played===0?'open':ptA>ptB?'A':ptB>ptA?'B':'draw';
  return{
    ptA:done?(ptA>ptB?1:ptA===ptB?0.5:0):0,
    ptB:done?(ptB>ptA?1:ptA===ptB?0.5:0):0,
    status,played,ptsA:ptA,ptsB:ptB
  };
}

function calcStableford(sc,hA,hB,par,si){
  const sA=sc.playerA||Array(18).fill(null);
  const sB=sc.playerB||Array(18).fill(null);
  let pA=0,pB=0,played=0;
  for(let i=0;i<18;i++){
    if(sA[i]==null||sB[i]==null)continue;
    played++;
    pA+=stbl(netto(sA[i],i,hA,si),par[i]||4);
    pB+=stbl(netto(sB[i],i,hB,si),par[i]||4);
  }
  const done=played===18;
  const status=played===0?'open':pA>pB?'A':pB>pA?'B':'draw';
  return{
    ptA:done?(pA>pB?1:pA===pB?0.5:0):0,
    ptB:done?(pB>pA?1:pA===pB?0.5:0):0,
    status,played,ptsA:pA,ptsB:pB
  };
}

function calcDayPts(day){
  let pA=0,pB=0;
  (S.pairings?.[day]||[]).forEach(p=>{
    const r=calcResult(p,day);
    pA+=r.ptA;pB+=r.ptB;
  });
  return{pA,pB};
}

function scTab(t){

  document.getElementById('sct-front').classList.toggle('active',t==='front');
  document.getElementById('sct-back').classList.toggle('active',t==='back');
  renderHoles();
}

function renderHoles(){
  const p=getPairing(curPid,curDay);if(!p)return;
  const c=getCourse(curDay);
  const par=c.par||DPAR,si=c.si||DSI;
  const hA=pHcp(p.playerA),hB=pHcp(p.playerB);
  const mode=p.mode||'matchplay';
  const bn=p.bruttoNetto||'brutto';
  const start=curTab==='front'?0:9;
  const holes=Array.from({length:9},(_,i)=>start+i);
  const conflicts=p.conflict||[];
  const colW=`32px 1fr 1fr ${mode==='matchplay'?'80px':'60px'}`;

  document.getElementById('sc-holes').innerHTML=holes.map(i=>{
    const pv=par[i]||4,siv=si[i]||i+1;
    const sA=curScores.playerA[i],sB=curScores.playerB[i];
    const nA2=netto(sA,i,hA,si),nB2=netto(sB,i,hB,si);
    const isConflict=conflicts.includes(i+1);
    const filled=sA!=null||sB!=null;

    // Nur eigene Seite editierbar wenn nicht forBoth
    const editA=forBoth||myRole==='playerA';
    const editB=forBoth||myRole==='playerB';

    // Hole result
    let hRes='<span style="color:#aaa;font-size:12px">–</span>';
    if(sA!=null&&sB!=null){
      const vA=bn==='netto'?nA2:sA;
      const vB=bn==='netto'?nB2:sB;
      if(mode==='matchplay'){
        if(vA<vB)hRes=`<span style="font-weight:900;color:var(--ta);font-size:14px">◀</span>`;
        else if(vB<vA)hRes=`<span style="font-weight:900;color:var(--tb);font-size:14px">▶</span>`;
        else hRes=`<span style="font-weight:700;color:#666;font-size:13px">½</span>`;
      }else if(mode==='stableford'){
        const stA=stbl(nA2,pv),stB=stbl(nB2,pv);
        const c2=stA>stB?'var(--ta)':stB>stA?'var(--tb)':'#666';
        hRes=`<span style="font-size:12px;font-weight:700;color:${c2}">${stA}:${stB}</span>`;
      }else{
        if(sA<sB)hRes=`<span style="color:var(--ta);font-weight:700;font-size:13px">A</span>`;
        else if(sB<sA)hRes=`<span style="color:var(--tb);font-weight:700;font-size:13px">B</span>`;
        else hRes=`<span style="color:#666;font-weight:700;font-size:13px">½</span>`;
      }
    }

    const stepA=editA
      ?`<div class="stepper" style="height:46px">
          <button class="stbtn" style="width:40px;font-size:24px" ontouchstart="" onclick="step('playerA',${i},-1)">−</button>
          <div class="${sA!=null?'stval':'stval empty'}" style="font-size:20px" id="sv-A-${i}">${sA!=null?sA:'–'}</div>
          <button class="stbtn" style="width:40px;font-size:24px" ontouchstart="" onclick="step('playerA',${i},+1)">+</button>
        </div>`
      :`<div style="text-align:center;font-size:20px;font-weight:700;color:${sA!=null?'var(--txt)':'#aaa'};padding:8px;background:var(--bg2);border-radius:8px;border:1px solid var(--border-light)">${sA!=null?sA:'–'}</div>`;

    const stepB=editB
      ?`<div class="stepper" style="height:46px">
          <button class="stbtn" style="width:40px;font-size:24px" ontouchstart="" onclick="step('playerB',${i},-1)">−</button>
          <div class="${sB!=null?'stval':'stval empty'}" style="font-size:20px" id="sv-B-${i}">${sB!=null?sB:'–'}</div>
          <button class="stbtn" style="width:40px;font-size:24px" ontouchstart="" onclick="step('playerB',${i},+1)">+</button>
        </div>`
      :`<div style="text-align:center;font-size:20px;font-weight:700;color:${sB!=null?'var(--txt)':'#aaa'};padding:8px;background:var(--bg2);border-radius:8px;border:1px solid var(--border-light)">${sB!=null?sB:'–'}</div>`;

    return`<div class="hole-row${filled?' filled':''}${isConflict?' conflict':''}" style="grid-template-columns:${colW}">
      <div class="hole-info"><div class="hole-num">${i+1}</div><div class="hole-par">P${pv}·SI${siv}</div></div>
      ${stepA}
      ${stepB}
      <div class="hole-res">${hRes}</div>
    </div>`;
  }).join('');
}

function step(player,idx,delta){
  const p=getPairing(curPid,curDay);
  const par=(getCourse(curDay).par||DPAR);
  const cur=curScores[player][idx];
  let next=cur==null?(par[idx]||4):cur+delta;
  if(next<1)next=1;if(next>15)next=15;
  curScores[player][idx]=next;
  const el=document.getElementById(`sv-${player==='playerA'?'A':'B'}-${idx}`);
  if(el){el.textContent=next;el.className='stval';}
  // Loch-Result neu rendern
  renderHoles();
  updateStatus();
}

function updateStatus(){
  const p=getPairing(curPid,curDay);if(!p)return;
  const c=getCourse(curDay);
  const par=c.par||DPAR,si=c.si||DSI;
  const hA=pHcp(p.playerA),hB=pHcp(p.playerB);
  const mode=p.mode||'matchplay';
  const bn=p.bruttoNetto||'brutto';
  const tempSc={playerA:[...curScores.playerA],playerB:[...curScores.playerB]};
  const r=calcResult({...p,scores:tempSc},curDay);
  const nA=pName(p.playerA).split(' ')[0];
  const nB=pName(p.playerB).split(' ')[0];

  const pill=document.getElementById('sc-spill');
  const lbl=document.getElementById('sc-slbl');
  const bar=document.getElementById('match-bar');

  if(mode==='matchplay'){
    const lead=r.lead||0;
    const left=18-(r.played||0);
    let txt='',bg='#f5f5f5',color='#333';
    if(r.played===0){txt='Noch kein Loch gespielt';}
    else if(lead===0){txt='ALL SQUARE';}
    else if(lead>0){
      txt=`${nA} ${lead} UP`;bg='var(--ta)';color='#fff';
      if(lead>left)txt+=` — GEWONNEN 🏆`;
    }else{
      txt=`${nB} ${Math.abs(lead)} UP`;bg='var(--tb)';color='#fff';
      if(Math.abs(lead)>left)txt+=` — GEWONNEN 🏆`;
    }
    bar.style.display='block';
    bar.style.background=bg;bar.style.color=color;
    bar.textContent=txt+(r.played>0?` · Loch ${r.played}/18`:'');
    pill.textContent=lead===0?'A/S':lead>0?`${lead}↑A`:`${Math.abs(lead)}↑B`;
    pill.style.color=lead>0?'var(--ta)':lead<0?'var(--tb)':'#666';
    lbl.textContent='Matchstand';
  }else if(mode==='stableford'){
    bar.style.display='block';
    bar.style.background=r.status==='A'?'var(--ta)':r.status==='B'?'var(--tb)':'#666';
    bar.style.color='#fff';
    bar.textContent=`${nA}: ${r.ptsA||0} Pkt  —  ${nB}: ${r.ptsB||0} Pkt`;
    pill.textContent=`${r.ptsA||0}:${r.ptsB||0}`;
    pill.style.color='var(--txt)';
    lbl.textContent='Punkte';
  }else{
    bar.style.display='none';
    pill.textContent='–';lbl.textContent='Stand';
  }
}

function checkConflict(p){
  const pending=p.pending||{};
  const pA=pending.playerA||[];
  const pB=pending.playerB||[];
  const conflicts=[];
  for(let i=0;i<18;i++){
    if(pA[i]!=null&&pB[i]!=null&&pA[i]!==pB[i])conflicts.push(i+1);
  }
  return conflicts;
}

async function saveScore(){
  const btn=document.getElementById('savebtn');
  btn.disabled=true;btn.textContent='Speichere…';
  const p=getPairing(curPid,curDay);if(!p){btn.disabled=false;return;}

  if(forBoth){
    // Direkt als confirmed speichern — kein Vergleich nötig
    S.pairings[curDay]=S.pairings[curDay].map(px=>{
      if(px.id!==curPid)return px;
      return{...px,
        scores:{playerA:[...curScores.playerA],playerB:[...curScores.playerB]},
        pending:null,conflict:null
      };
    });
    try{await window._fbSet('rc',S);showToast('✅ Scores für beide gespeichert');}
    catch(e){showToast('⚠️ Fehler');}
  }else{
    // Eigenen pending score speichern
    S.pairings[curDay]=S.pairings[curDay].map(px=>{
      if(px.id!==curPid)return px;
      const pend={...(px.pending||{}),[myRole]:[...curScores[myRole]]};
      return{...px,pending:pend};
    });
    try{
      await window._fbSet('rc',S);
      const updP=getPairing(curPid,curDay);
      const pending=updP?.pending||{};
      const other=myRole==='playerA'?'playerB':'playerA';

      if(pending[other]&&pending[other].length>0){
        // Vergleichen
        const mine=pending[myRole]||[];
        const theirs=pending[other]||[];
        const conflicts=[];
        for(let i=0;i<18;i++){
          if(mine[i]!=null&&theirs[i]!=null&&mine[i]!==theirs[i])conflicts.push(i+1);
        }
        if(conflicts.length===0){
          // ✅ Übereinstimmung → confirmed
          S.pairings[curDay]=S.pairings[curDay].map(px=>{
            if(px.id!==curPid)return px;
            return{...px,
              scores:{playerA:[...pending.playerA],playerB:[...pending.playerB]},
              pending:null,conflict:null
            };
          });
          await window._fbSet('rc',S);
          showToast('✅ Scores übereinstimmend — bestätigt!');
        }else{
          // ⚠️ Konflikt
          S.pairings[curDay]=S.pairings[curDay].map(px=>{
            if(px.id!==curPid)return px;
            return{...px,conflict:conflicts};
          });
          await window._fbSet('rc',S);
          const cw=document.getElementById('conflict-warn');
          cw.style.display='block';
          cw.textContent=`⚠️ Abweichung bei Loch ${conflicts.join(', ')}! Beide Spieler müssen diese Löcher korrigieren und erneut speichern.`;
          alert(`⚠️ Abweichung bei Loch ${conflicts.join(', ')}!\n\nBitte beide Scores nochmal eintragen.`);
          btn.disabled=false;btn.textContent='Score speichern ✓';
          return;
        }
      }else{
        showToast('✓ Dein Score gespeichert — warte auf Gegner');
      }
    }catch(e){showToast('⚠️ Fehler beim Speichern');}
  }
  btn.disabled=false;btn.textContent='Score speichern ✓';
  renderLB();
}

// ADMIN
// ══════════════════════════════════════════════
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='admin')initAdmin();
}

function initAdmin(){
  document.getElementById('a-name').value=S.eventName||'';
  document.getElementById('a-d1').value=S.date1||today();
  document.getElementById('a-d2').value=S.date2||today();
  document.getElementById('a-ta').value=S.teamA?.name||'Team Rot';
  document.getElementById('a-tb').value=S.teamB?.name||'Team Blau';
  const c1=S.courses?.[1]||{};const c2=S.courses?.[2]||{};
  document.getElementById('a-c1-name').value=c1.name||'';
  document.getElementById('a-c1-par').value=c1.par?(c1.par.reduce((a,b)=>a+b,0)||''):'';
  document.getElementById('a-c1-si').value=c1.si?c1.si.join(','):'';
  document.getElementById('a-c2-name').value=c2.name||'';
  document.getElementById('a-c2-par').value=c2.par?(c2.par.reduce((a,b)=>a+b,0)||''):'';
  document.getElementById('a-c2-si').value=c2.si?c2.si.join(','):'';
  renderAdmPlayers();renderAdmPairs();
  // Load Supabase courses
  sbGet('courses?select=*&order=name').then(cs=>{
    [1,2].forEach(d=>{
      const sel=document.getElementById(`a-c${d}-sel`);
      if(!sel)return;
      sel.innerHTML='<option value="">— Gespeicherten Platz laden —</option>'+
        (cs||[]).map(c=>`<option value="${esc(c.name)}">${esc(c.name)}</option>`).join('');
    });
  }).catch(()=>{});
}

async function loadCourse(day,name){
  if(!name)return;
  try{
    const cs=await sbGet('courses?select=*&order=name');
    const c=(cs||[]).find(x=>x.name===name);
    if(!c)return;
    const par=JSON.parse(c.par||'[]');
    const si=JSON.parse(c.stroke_index||'[]');
    document.getElementById(`a-c${day}-name`).value=c.name;
    document.getElementById(`a-c${day}-par`).value=par.reduce((a,b)=>a+b,0)||72;
    document.getElementById(`a-c${day}-si`).value=si.join(',');
    showToast('✓ '+c.name);
  }catch(e){showToast('⚠️ Fehler');}
}

function renderAdmPlayers(){
  ['a','b'].forEach(t=>{
    const ps=(t==='a'?S.teamA:S.teamB)?.players||[];
    document.getElementById(`a-pl-${t}`).innerHTML=ps.map(p=>`
      <div class="prow">
        <div class="pcell">${esc(p.name)}</div>
        <input class="inp" type="number" step="0.1" value="${p.hcp||''}" placeholder="Vorg."
          style="text-align:center;padding:8px 4px;font-size:14px"
          oninput="updHcp('${t}','${p.id}',this.value)">
        <button class="rmbtn" onclick="rmP('${t}','${p.id}')">×</button>
      </div>`).join('');
  });
}

function addP(t){
  const n=document.getElementById(`np-${t}`).value.trim();if(!n)return;
  const h=document.getElementById(`nh-${t}`).value;
  const p={id:uid(),name:n,hcp:Number(h)||0};
  if(t==='a')S.teamA.players=[...(S.teamA.players||[]),p];
  else S.teamB.players=[...(S.teamB.players||[]),p];
  document.getElementById(`np-${t}`).value='';
  document.getElementById(`nh-${t}`).value='';
  renderAdmPlayers();renderAdmPairs();
}

function rmP(t,id){
  if(!confirm('Spieler wirklich löschen?'))return;
  if(t==='a')S.teamA.players=(S.teamA.players||[]).filter(p=>p.id!==id);
  else S.teamB.players=(S.teamB.players||[]).filter(p=>p.id!==id);
  renderAdmPlayers();renderAdmPairs();
}

function updHcp(t,id,v){
  const ps=t==='a'?S.teamA.players:S.teamB.players;
  const p=ps.find(p=>p.id===id);if(p)p.hcp=Number(v)||0;
}

function setPDay(d){
  admPDay=d;
  document.querySelectorAll('.dtab').forEach((b,i)=>b.classList.toggle('active',i+1===d));
  renderAdmPairs();
}

function renderAdmPairs(){
  const pairs=(S.pairings?.[admPDay])||[];
  const pA=S.teamA?.players||[];
  const pB=S.teamB?.players||[];
  const optA='<option value="">– '+( S.teamA?.name||'Team A')+' –</option>'+pA.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  const optB='<option value="">– '+(S.teamB?.name||'Team B')+' –</option>'+pB.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');

  document.getElementById('a-pairs').innerHTML=pairs.map((p,i)=>{
    const modes=['matchplay','bestball','stableford'];
    const bns=['brutto','netto'];
    return`<div class="pair-adm">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:var(--txt2)">Paarung ${i+1}</div>
        <button onclick="rmPair(${i})" style="background:none;border:none;color:var(--red);font-size:20px;cursor:pointer">×</button>
      </div>
      <div class="pair-adm-row">
        <select class="inp" style="padding:8px;font-size:13px" onchange="updPair(${i},'playerA',this.value)">
          ${optA.replace(`value="${p.playerA}"`,`value="${p.playerA}" selected`)}
        </select>
        <div style="text-align:center;font-size:12px;font-weight:700;color:var(--txt3)">VS</div>
        <select class="inp" style="padding:8px;font-size:13px" onchange="updPair(${i},'playerB',this.value)">
          ${optB.replace(`value="${p.playerB}"`,`value="${p.playerB}" selected`)}
        </select>
      </div>
      <div style="font-size:9px;color:var(--txt3);letter-spacing:1px;margin-bottom:4px">SPIELMODUS</div>
      <div class="mode-chips" style="margin-bottom:8px">
        ${modes.map(m=>`<button class="chip${p.mode===m?' active':''}" onclick="updPair(${i},'mode','${m}')">${m==='matchplay'?'Matchplay':m==='bestball'?'Best Ball':'Stableford'}</button>`).join('')}
      </div>
      <div style="font-size:9px;color:var(--txt3);letter-spacing:1px;margin-bottom:4px">WERTUNG</div>
      <div class="mode-chips">
        ${bns.map(bn=>`<button class="chip${p.bruttoNetto===bn?' active':''}" onclick="updPair(${i},'bruttoNetto','${bn}')">${bn==='brutto'?'Brutto':'Netto'}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function addPair(){
  if(!S.pairings)S.pairings={1:[],2:[]};
  if(!S.pairings[admPDay])S.pairings[admPDay]=[];
  S.pairings[admPDay].push({id:uid(),playerA:'',playerB:'',mode:'matchplay',bruttoNetto:'brutto',scores:null});
  renderAdmPairs();
}

function rmPair(i){
  if(!confirm('Paarung löschen?'))return;
  S.pairings[admPDay].splice(i,1);
  renderAdmPairs();
}

function updPair(i,f,v){
  if(!S.pairings[admPDay][i])return;
  S.pairings[admPDay][i][f]=v;
  renderAdmPairs();
}

function resetAll(){
  if(!confirm('Alles zurücksetzen? Alle Scores werden gelöscht!'))return;
  S={eventName:'Ryder Cup Elkofen',date1:today(),date2:today(),
    teamA:{name:'Team Rot',players:[]},teamB:{name:'Team Blau',players:[]},
    courses:{1:{name:'',par:[...DPAR],si:[...DSI]},2:{name:'',par:[...DPAR],si:[...DSI]}},
    pairings:{1:[],2:[]}};
  initAdmin();
}

async function saveAdmin(){
  for(let d=1;d<=2;d++){
    const name=document.getElementById(`a-c${d}-name`).value||'';
    const siRaw=document.getElementById(`a-c${d}-si`).value;
    let si=siRaw?siRaw.split(',').map(Number).filter(n=>n>0):[];
    if(si.length<18)si=[...DSI];
    S.courses[d]={name,par:[...DPAR],si:si.slice(0,18)};
  }
  S.eventName=document.getElementById('a-name').value||'Ryder Cup Elkofen';
  S.date1=document.getElementById('a-d1').value||today();
  S.date2=document.getElementById('a-d2').value||today();
  S.teamA.name=document.getElementById('a-ta').value||'Team Rot';
  S.teamB.name=document.getElementById('a-tb').value||'Team Blau';
  try{
    await window._fbSet('rc',S);
    showToast('✅ Gespeichert & synchronisiert');
  }catch(e){showToast('⚠️ Firebase nicht erreichbar');}
  showView('lb');
}

function cancelRoleSheet(){
  document.getElementById('role-sheet').style.display='none';
}

function confirmRoleSheet(){
  document.getElementById('role-sheet').style.display='none';
  const pid=window._pendingPid;
  const day=window._pendingDay;
  const role=document.getElementById('role-sel').value;
  const p=getPairing(pid,day);if(!p)return;
  const nA=pName(p.playerA),nB=pName(p.playerB);
  const mode=p.mode||'matchplay';
  const mL=mode==='matchplay'?'Matchplay':mode==='bestball'?'Best Ball':'Stableford';

  curPid=pid; curDay=day;
  forBoth=(role==='both');
  myRole=forBoth?'playerA':(role==='playerA'?'playerA':'playerB');

  // Scores laden
  const pending=p.pending||{};
  const confirmed=p.scores||{};
  if(forBoth){
    curScores={
      playerA:[...(confirmed.playerA||Array(18).fill(null))],
      playerB:[...(confirmed.playerB||Array(18).fill(null))]
    };
  }else{
    curScores={
      playerA:[...(pending.playerA||confirmed.playerA||Array(18).fill(null))],
      playerB:[...(pending.playerB||confirmed.playerB||Array(18).fill(null))]
    };
  }

  document.getElementById('sc-title').textContent=`${nA} vs ${nB}`;
  document.getElementById('sc-sub').textContent=forBoth
    ?`Scorer für beide · ${mL} · ${p.bruttoNetto==='netto'?'Netto':'Brutto'}`
    :role==='playerA'
      ?`Du: ${nA} · ${mL} · ${p.bruttoNetto==='netto'?'Netto':'Brutto'}`
      :`Du: ${nB} · ${mL} · ${p.bruttoNetto==='netto'?'Netto':'Brutto'}`;

  const cw=document.getElementById('conflict-warn');
  if(p.conflict&&p.conflict.length){
    cw.style.display='block';
    cw.textContent=`⚠️ Abweichung bei Loch ${p.conflict.join(', ')} — bitte korrigieren.`;
  }else{cw.style.display='none';}

  document.getElementById('sct-front').classList.add('active');
  document.getElementById('sct-back').classList.remove('active');
  curTab='front';
  const colW=`32px 1fr 1fr ${mode==='matchplay'?'80px':'60px'}`;
  document.getElementById('sc-colhead').style.gridTemplateColumns=colW;
  document.getElementById('sc-colhead').innerHTML=`<span>LOCH</span><span style="text-align:center;color:var(--ta)">${esc(nA.split(' ')[0])}</span><span style="text-align:center;color:var(--tb)">${esc(nB.split(' ')[0])}</span><span style="text-align:center">RESULT</span>`;

  renderHoles();
  updateStatus();
  showView('score');
}
</script>
